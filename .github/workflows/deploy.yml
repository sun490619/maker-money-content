name: 🚀 部署

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pre-deploy Check
        run: |
          echo "=== 文件清单 ==="
          find . -name "*.html" -not -path "./.git/*" | sort
          echo ""
          echo "=== 体检 ==="
          python content_health_check.py || echo "⚠️ 体检有警告，继续部署"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy . --project-name=maker-earn --branch=main

      - name: Purge CDN Cache
        run: |
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=makerearn.com" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "null" ]; then
            echo "🧹 Purging cache for zone $ZONE_ID ..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' | jq .
          else
            echo "⚠️ Zone ID lookup failed — cache will expire within 1 hour (new _headers policy)"
          fi

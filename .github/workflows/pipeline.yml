name: 🔭 需求雷达扫描

on:
  schedule:
    - cron: "0 * * * *"  # 每小时
  workflow_dispatch:  # 手动触发

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Radar
        run: |
          python content_radar.py
          cat radar_report.md >> $GITHUB_STEP_SUMMARY

      - name: Create Issue if new topics
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('radar_report.md', 'utf8');
            const highPriority = report.match(/- \[(\d+)\] (.+)/g);
            if (highPriority && highPriority.length > 0) {
              const title = `🔭 选题报告 ${new Date().toISOString().slice(0,10)}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: report.slice(0, 6000),
                labels: ['选题'],
              });
            }

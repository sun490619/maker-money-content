name: 🏥 站点体检

on:
  schedule:
    - cron: "0 8 * * *"  # 每天 UTC 8:00 (北京时间 16:00)
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Health Check
        run: |
          python content_health_check.py
          cat health_report.md >> $GITHUB_STEP_SUMMARY

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health_report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 站点体检异常 ${new Date().toISOString().slice(0,10)}`,
              body: report.slice(0, 6000),
              labels: ['紧急'],
            });
